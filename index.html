<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashik Raja | Portfolio</title>

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card {
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        h1 {
            margin: 10px;
        }

        .skills span {
            display: inline-block;
            margin: 5px;
            padding: 8px 12px;
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
            transition: 0.3s;
        }

        .skills span:hover {
            background: #00c6ff;
            cursor: pointer;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #00c6ff;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0072ff;
        }

    </style>
</head>

<body>

    <div class="card">

        <h1>Ashik Raja</h1>
        <p>DevOps Learner | Middleware Engineer | Linux | Docker | GitHub | AWS</p>

        <h3>Skills</h3>

        <div class="skills">
            <span>Linux</span>
            <span>Docker</span>
            <span>GitHub</span>
            <span>GitHub Actions</span>
            <span>AWS</span>
            <span>WebLogic</span>
            <span>IIS</span>
            <span>Shell Script</span>
        </div>

        <button class="btn">Contact Me</button>

    </div>

</body>
</html>
